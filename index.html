<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhãn giá / Cenovky</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }

  .form-panel {
    max-width: 700px; margin: 30px auto; background: #fff;
    border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 30px;
  }
  .form-panel h1 { text-align: center; margin-bottom: 5px; font-size: 24px; color: #2d6a2e; }
  .form-panel .subtitle { text-align: center; color: #888; margin-bottom: 18px; font-size: 14px; }

  /* language switch */
  .lang-switch { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
  .lang-switch button {
    padding: 5px 12px; border: 1.5px solid #ccc; background: #fff; color: #666;
    border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600;
  }
  .lang-switch button.active { border-color: #2d6a2e; background: #2d6a2e; color: #fff; }

  .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
  .form-group { flex: 1; display: flex; flex-direction: column; }
  .form-group label { font-weight: 600; margin-bottom: 4px; font-size: 13px; color: #555; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 15px; transition: border-color 0.2s; font-family: inherit;
  }
  .form-group textarea { resize: vertical; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: #2d6a2e;
  }
  .note-warn {
    display: none; margin-top: 5px; font-size: 12px; color: #b8860b;
    background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px; padding: 5px 8px;
  }
  .note-warn.show { display: block; }
  .note-warn.error { color: #c0392b; background: #fdecea; border-color: #f5c6c2; font-weight: 600; }
  .form-group textarea.error, .form-group input.error { border-color: #e74c3c; background: #fef6f5; }

  .btn-row { display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
  .btn { padding: 12px 28px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-add { background: #2d6a2e; color: #fff; } .btn-add:hover { background: #245623; }
  .btn-print { background: #1a73e8; color: #fff; } .btn-print:hover { background: #1557b0; }
  .btn-clear { background: #e8e8e8; color: #555; } .btn-clear:hover { background: #d0d0d0; }
  .btn-remove { background: #f3f3f3; color: #c0392b; padding: 2px 9px; font-size: 13px; font-weight: 700; border-radius: 50%; border: 1px solid #e0e0e0; cursor: pointer; }
  .btn-remove:hover { background: #e74c3c; color: #fff; border-color: #e74c3c; }

  /* preview */
  .preview-section { margin: 24px 0 0; padding-top: 16px; border-top: 1px solid #eee; }
  .preview-section h2 { text-align: center; color: #555; margin-bottom: 15px; font-size: 18px; }
  .label-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .label-preview { border: 1.5px solid #ccc; border-radius: 8px; padding: 8px 12px; background: #fff; width: 220px; font-size: 12px; position: relative; }
  .label-preview .lp-name { font-weight: 700; font-size: 14px; color: #2d6a2e; margin-bottom: 3px; text-align: center; }
  .label-preview .lp-origin { color: #888; font-size: 11px; margin-bottom: 5px; text-align: center; }
  .label-preview .lp-line { text-align: center; font-size: 12px; color: #444; margin-bottom: 2px; }
  .label-preview .lp-twocol { display: flex; gap: 12px; }
  .label-preview .lp-left { flex: 1.3; text-align: left; min-width: 0; }
  .label-preview .lp-left .lp-name, .label-preview .lp-left .lp-origin, .label-preview .lp-left .lp-price-big, .label-preview .lp-left .lp-price100 { text-align: left; }
  .label-preview .lp-right { flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: left; min-width: 0; }
  .label-preview .lp-grid { display: grid; grid-template-columns: max-content max-content; column-gap: 6px; row-gap: 1px; font-size: 11px; color: #444; margin-bottom: 2px; }
  .label-preview .lp-grid span:nth-child(odd) { color: #888; }
  .label-preview .lp-note-h { font-size: 10px; color: #888; margin-bottom: 2px; }
  .label-preview .lp-note-b { font-size: 11px; font-style: italic; color: #555; line-height: 1.3; word-break: break-word; }
  .label-preview .lp-price-big { font-size: 16px; font-weight: 700; color: #c0392b; text-align: center; margin-top: 4px; }
  .label-preview .lp-price100 { text-align: center; font-size: 11px; color: #777; }
  .label-preview .lp-note { text-align: center; font-size: 11px; color: #555; margin-top: 4px; font-style: italic; word-break: break-word; }
  .label-preview .lp-count { position: absolute; top: 4px; right: 8px; background: #2d6a2e; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; }
  .label-preview .lp-actions { text-align: center; margin-top: 6px; }

  .auto-price { padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 17px; font-weight: 700; color: #c0392b; background: #fafafa; min-height: 42px; display: flex; align-items: center; }

  /* presets */
  .presets { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
  .preset-add-row { display: flex; justify-content: center; margin-bottom: 14px; }
  .preset-chip { display: inline-flex; align-items: center; border: 1.5px solid #2d6a2e; border-radius: 20px; overflow: hidden; background: #fff; }
  .preset-chip .preset-fill { border: none; background: transparent; color: #2d6a2e; font-size: 13px; padding: 6px 6px 6px 14px; cursor: pointer; font-weight: 600; }
  .preset-chip .preset-del { border: none; background: transparent; color: #c0392b; font-size: 16px; line-height: 1; padding: 4px 10px 4px 4px; cursor: pointer; font-weight: 700; }
  .preset-chip:hover { background: #f0f8f0; }
  .preset-chip .preset-del:hover { color: #fff; background: #e74c3c; border-radius: 0 18px 18px 0; }
  .preset-chip-add { border: 1.5px dashed #2d6a2e; border-radius: 20px; background: #f0f8f0; color: #2d6a2e; font-size: 13px; font-weight: 700; padding: 6px 16px; cursor: pointer; }
  .preset-chip-add:hover { background: #2d6a2e; color: #fff; }
  .preset-add-form { display: none; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; margin: 0 0 18px; padding: 12px; background: #f7faf7; border: 1.5px solid #cfe3d0; border-radius: 10px; }
  .preset-add-form.show { display: flex; }
  .preset-add-form input { padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; flex: 1; min-width: 120px; }
  .preset-add-form input.suggested { border-style: dashed; border-color: #2d6a2e; background: #f0f8f0; color: #2d6a2e; font-weight: 600; letter-spacing: 1px; }
  .preset-add-form input:disabled { background: #f0f0f0; color: #aaa; border-style: solid; font-weight: 400; letter-spacing: 0; }
  .preset-add-form button { padding: 8px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .preset-add-form .pf-save { background: #2d6a2e; color: #fff; }
  .preset-add-form .pf-cancel { background: #e8e8e8; color: #555; }
  .preset-add-form .pf-row { width: 100%; display: flex; gap: 8px; flex-wrap: wrap; }
  .pf-toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #2d6a2e; font-weight: 600; cursor: pointer; user-select: none; }
  .pf-toggle .pf-switch { width: 36px; height: 20px; background: #ccc; border-radius: 10px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .pf-toggle .pf-switch::after { content: ''; width: 16px; height: 16px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); transition: left 0.2s; }
  .pf-toggle input { display: none; }
  .pf-toggle input:checked + .pf-switch { background: #2d6a2e; }
  .pf-toggle input:checked + .pf-switch::after { left: 18px; }
  .pf-toggle.off { color: #888; }
  .pf-hint { font-size: 11px; color: #c0392b; padding: 6px 10px; background: #fdecea; border:1px solid #f5c6c2; border-radius: 6px; width: 100%; display:none; }
  .pf-hint.show { display: block; }
  .preset-chip .preset-bc { font-size: 10px; color: #888; padding: 0 6px; border-left: 1px solid #ddd; font-family: 'Consolas', monospace; }
  .preset-chip .preset-bc.off { text-decoration: line-through; }
  .label-preview .lp-barcode { display: flex; flex-direction: column; align-items: center; gap: 2px; padding-top: 4px; }
  .label-preview .lp-barcode svg { max-width: 100%; height: 28px; }
  .label-preview .lp-bc-text { font-size: 10px; color: #555; letter-spacing: 1px; font-family: 'Consolas', monospace; }
  .label-preview .lp-right-split { display: flex; flex-direction: column; height: 100%; }
  .label-preview .lp-right-split .lp-note-block { flex: 1; }
  .label-preview .lp-right-split .lp-bc-block { padding-top: 4px; display: flex; flex-direction: column; align-items: center; }

  /* main row: fields | tracker */
  .main-row { display: flex; gap: 20px; align-items: flex-start; }
  .fields { flex: 1; min-width: 0; }
  .fields .form-row:last-child { margin-bottom: 0; }

  .tracker { width: 190px; flex-shrink: 0; padding: 10px; border: 1.5px solid #cfe3d0; border-radius: 10px; background: #fafdfa; }
  .tracker-count { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1.5px dashed #cfe3d0; }
  .tracker-count label { display: block; font-weight: 600; font-size: 12px; color: #555; text-align: center; margin-bottom: 4px; }
  .tracker-count input { width: 100%; padding: 8px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 16px; font-weight: 700; text-align: center; color: #2d6a2e; }
  .tracker-count input:focus { outline: none; border-color: #2d6a2e; }
  .tracker-title { font-weight: 700; color: #2d6a2e; font-size: 13px; text-align: center; margin-bottom: 2px; }
  .tracker-layout { text-align: center; font-size: 10px; color: #777; margin-bottom: 8px; line-height: 1.25; white-space: normal; word-break: break-word; }
  .tracker-grid { display: grid; gap: 3px; margin-bottom: 8px; max-width: 132px; margin-left: auto; margin-right: auto; }
  .tcell { aspect-ratio: 2.3 / 1; border: 1.5px solid #ccc; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; cursor: pointer; background: #fff; color: #999; user-select: none; }
  .tcell.used { background: #e0e0e0; color: #bbb; text-decoration: line-through; }
  .tcell.queued { background: #a5d6a7; color: #1b5e20; border-color: #2d6a2e; font-weight: 700; }
  .tcell.next { background: #2d6a2e; color: #fff; border-color: #2d6a2e; box-shadow: 0 0 0 2px #a5d6a7; }
  .tcell.free:hover { border-color: #2d6a2e; }
  .tracker-next { text-align: center; font-size: 12px; color: #333; margin-bottom: 3px; }
  .tracker-next b { color: #2d6a2e; font-size: 15px; }
  .tracker-free { text-align: center; font-size: 10px; color: #888; margin-bottom: 8px; }
  .tracker-controls { display: flex; gap: 4px; justify-content: center; }
  .tracker-controls button { flex: 1; padding: 6px 2px; border: 1.5px solid #2d6a2e; background: #fff; color: #2d6a2e; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
  .tracker-controls button:hover { background: #2d6a2e; color: #fff; }
  .tracker-hint { text-align: center; font-size: 9px; color: #aaa; margin-top: 6px; }

  /* modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); max-width: 460px; width: 90%; padding: 28px; }
  .modal h2 { text-align: center; color: #2d6a2e; font-size: 20px; margin-bottom: 6px; }
  .modal .modal-layout { text-align: center; font-size: 15px; font-weight: 700; color: #333; background: #e8f5e9; border-radius: 8px; padding: 8px; margin-bottom: 16px; }
  .modal table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .modal td { padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 14px; }
  .modal td:first-child { font-weight: 600; color: #555; width: 55%; }
  .modal td:last-child { font-weight: 700; color: #2d6a2e; }
  .modal .modal-warn { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #856404; margin-bottom: 16px; text-align: center; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  .modal-btns button { padding: 10px 28px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .modal-btn-print { background: #1a73e8; color: #fff; }
  .modal-btn-cancel { background: #e8e8e8; color: #555; }

  /* mobile */
  @media (max-width: 600px) {
    .form-panel { margin: 12px; padding: 18px 16px; border-radius: 10px; }
    .form-panel h1 { font-size: 20px; }
    .main-row { flex-direction: column; gap: 16px; }
    .tracker { width: 100%; }
    .form-row { flex-direction: column; gap: 12px; }
    .btn-row { flex-direction: column; }
    .btn { width: 100%; padding: 14px; font-size: 16px; }
    .form-group input, .form-group select, .form-group textarea { font-size: 16px; padding: 12px; }
    .auto-price { font-size: 16px; }
    .label-preview { width: 100%; max-width: 320px; }
    .modal { padding: 20px 16px; }
    .modal-btns { flex-direction: column; }
    .modal-btns button { width: 100%; }
  }

  /* print */
  #printPage { display: none; }
  @media print {
    body { background: #fff; }
    .form-panel, .preview-section, .no-print { display: none !important; }
    #printPage { display: block !important; }
    @page { size: A4; margin: 0; }
  }
  .print-page { width: 210mm; height: 297mm; margin: 0 auto; page-break-after: always; overflow: hidden; }
  .print-page:last-child { page-break-after: avoid; }
  .print-grid { width: 210mm; display: flex; flex-wrap: wrap; align-content: flex-start; }
  .print-label { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; justify-content: center; }
</style>
</head>
<body>

<div class="form-panel">
  <div class="lang-switch">
    <button id="langVi" onclick="setLang('vi')">🇻🇳 Tiếng Việt</button>
    <button id="langCs" onclick="setLang('cs')">🇨🇿 Čeština</button>
  </div>

  <h1 data-i18n="title">Nhãn giá</h1>
  <p class="subtitle" data-i18n="subtitle">In nhãn giá lên giấy decal A4</p>

  <div class="presets" id="presets"></div>
  <div class="preset-add-row" id="presetAddRow">
    <button class="preset-chip-add" id="addPresetBtn" onclick="toggleAddPreset(true)" data-i18n="addPreset">+ Thêm</button>
  </div>
  <div class="preset-add-form" id="presetAddForm">
    <div class="pf-row">
      <input type="text" id="newPresetName" data-i18n-ph="presetNamePh" oninput="onPresetNameInput()">
      <input type="text" id="newPresetOrigin" data-i18n-ph="presetOriginPh">
      <input type="text" id="newPresetBarcode" data-i18n-ph="presetBarcodePh" maxlength="20" oninput="onPresetBarcodeInput()">
    </div>
    <div class="pf-row" style="justify-content:flex-start;">
      <label class="pf-toggle" id="pfToggle">
        <input type="checkbox" id="newPresetUseBC" checked onchange="onToggleBarcode()">
        <span class="pf-switch"></span>
        <span id="pfToggleLabel" data-i18n="useBarcode">Dùng mã vạch</span>
      </label>
    </div>
    <div class="pf-hint" id="pfHint"></div>
    <div class="pf-row" style="justify-content:flex-end;">
      <button class="pf-save" onclick="confirmAddPreset()" data-i18n="save">Lưu</button>
      <button class="pf-cancel" onclick="toggleAddPreset(false)" data-i18n="cancel">Hủy</button>
    </div>
  </div>

  <div class="main-row">
    <div class="fields">
      <div class="form-row">
        <div class="form-group">
          <label for="fname" data-i18n="fname">Tên trái cây</label>
          <input type="text" id="fname" data-i18n-ph="fnamePh" oninput="checkNote()">
        </div>
        <div class="form-group">
          <label for="forigin" data-i18n="forigin">Xuất xứ (nước)</label>
          <input type="text" id="forigin" data-i18n-ph="foriginPh">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fpricekg" data-i18n="fpricekg">Giá mỗi kg (Kč)</label>
          <input type="number" id="fpricekg" step="0.01" min="0" data-i18n-ph="fpricekgPh" oninput="autoCalc()">
        </div>
        <div class="form-group">
          <label for="fweight" data-i18n="fweight">Cân nặng (kg)</label>
          <input type="number" id="fweight" step="0.01" min="0" data-i18n-ph="fweightPh" oninput="autoCalc()">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label data-i18n="price100g">Giá mỗi 100g (Kč)</label>
          <div class="auto-price" id="autoPrice100g">—</div>
        </div>
        <div class="form-group">
          <label data-i18n="priceKus">Giá mỗi miếng (Kč) — tự động</label>
          <div class="auto-price" id="autoPriceKus">—</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="flayout" data-i18n="layout">Khổ giấy nhãn</label>
          <select id="flayout" onchange="onLayoutChange()"></select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fnote" data-i18n="note">Ghi chú — hướng dẫn (tùy chọn)</label>
          <textarea id="fnote" rows="2" data-i18n-ph="notePh" oninput="checkNote()"></textarea>
          <div class="note-warn" id="noteWarn"></div>
        </div>
      </div>
    </div>

    <div class="tracker" id="tracker">
      <div class="tracker-count">
        <label for="fcount" data-i18n="count">Số lượng nhãn</label>
        <input type="number" id="fcount" value="1" min="1" max="100">
      </div>
      <div class="tracker-title" data-i18n="posTitle">📍 Vị trí in</div>
      <div class="tracker-layout" id="trackerLayout"></div>
      <div class="tracker-grid" id="trackerGrid"></div>
      <div class="tracker-next"><span data-i18n="nextLbl">Tiếp:</span> <b id="nextPosLabel">#1</b></div>
      <div class="tracker-free" id="trackerFree"></div>
      <div class="tracker-controls">
        <button onclick="adjustPos(-1)" id="btnPrev">◀</button>
        <button onclick="resetPos()" id="btnReset" data-i18n="btnReset">Tờ mới</button>
        <button onclick="adjustPos(1)" id="btnNext">▶</button>
      </div>
      <div class="tracker-hint" data-i18n="posHint">Bấm vào ô để chọn vị trí bắt đầu</div>
    </div>
  </div>

  <div class="preview-section" id="previewSection">
    <h2 id="previewHeading"></h2>
    <div class="label-list" id="labelList"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-add" onclick="addLabel()" data-i18n="addLabel">Thêm nhãn</button>
    <button class="btn btn-print" onclick="printLabels()" data-i18n="print">In</button>
    <button class="btn btn-clear" onclick="clearAll()" data-i18n="clearAll">Xóa hết</button>
  </div>
</div>

<div id="printPage"></div>

<script>
  // ===== i18n =====
  const STR = {
    vi: {
      htmlLang: 'vi', docTitle: 'Nhãn giá',
      title: 'Nhãn giá', subtitle: 'In nhãn giá lên giấy decal A4',
      fname: 'Tên trái cây', fnamePh: 'vd. Vodní meloun',
      forigin: 'Xuất xứ (nước)', foriginPh: 'vd. Španělsko',
      fpricekg: 'Giá mỗi kg (Kč)', fpricekgPh: 'vd. 24.90',
      fweight: 'Cân nặng (kg)', fweightPh: 'vd. 5.2',
      price100g: 'Giá mỗi 100g (Kč)', priceKus: 'Giá mỗi miếng (Kč) — tự động',
      layout: 'Khổ giấy nhãn', recommended: '(khuyên dùng)',
      note: 'Ghi chú — hướng dẫn (tùy chọn)', notePh: 'vd. Skladujte v chladu',
      count: 'Số lượng nhãn', posTitle: '📍 Vị trí in', nextLbl: 'Tiếp:',
      btnReset: 'Tờ mới', prevTitle: 'Vị trí trước', resetTitle: 'Tờ giấy mới', nextTitle: 'Vị trí sau',
      posHint: 'Bấm vào ô để chọn vị trí bắt đầu',
      previewTitle: 'Xem trước nhãn', unit: 'cái',

  // ===== LAYOUTS (na arch -> mřížka). Text NA ETIKETĚ je vždy česky (čte ho zákazník v ČR). =====
  const LAYOUTS = {
    '4':  { label: 'A4 105 × 148,5 mm – 4ks',  cols: 2, rows: 2, w: 105, h: 148.5, nameF: 30, originF: 16, detF: 15, bigF: 42, p100F: 14, noteF: 12, nameMax: 26, noteMax: 500, bcW: 60, bcH: 18, bcFont: 11 },

    '10': { label: 'A4 105 × 57 mm – 10ks',    cols: 2, rows: 5, w: 105, h: 57,    nameF: 19, originF: 12, detF: 13, bigF: 26, p100F: 12, noteF: 9,  nameMax: 23, noteMax: 250, bcW: 40, bcH: 9,  bcFont: 7 },
    '12': { label: 'A4 105 × 48 mm – 12ks',    cols: 2, rows: 6, w: 105, h: 48,    nameF: 16, originF: 11, detF: 12, bigF: 22, p100F: 11, noteF: 8,  nameMax: 22, noteMax: 220, bcW: 38, bcH: 8,  bcFont: 7 },
    '21': { label: 'A4 70 × 42,3 mm – 21ks',   cols: 3, rows: 7, w: 70,  h: 42.3,  nameF: 13, originF: 8,  detF: 9,  bigF: 17, p100F: 8,  noteF: 6,  nameMax: 16, noteMax: 350, bcW: 25, bcH: 7,  bcFont: 6 },
    '24': { label: 'A4 70 × 36 mm – 24ks',     cols: 3, rows: 8, w: 70,  h: 36,    nameF: 12, originF: 8,  detF: 9,  bigF: 15, p100F: 8,  noteF: 6,  nameMax: 15, noteMax: 170, bcW: 25, bcH: 6,  bcFont: 6 },
    '27': { label: 'A4 70 × 31,5 mm – 27ks',   cols: 3, rows: 9, w: 70,  h: 31.5,  nameF: 11, originF: 7,  detF: 8,  bigF: 14, p100F: 7,  noteF: 5,  nameMax: 14, noteMax: 140, bcW: 25, bcH: 5,  bcFont: 5 },
  };
  const DEFAULT_LAYOUT = '21';
  const DEFAULT_PRESETS = [['Vodní meloun', 'Španělsko', 'VM01']];

  // localStorage (může být blokováno přes file://)
  const store = {
    get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
  };

  let lang = (STR[store.get('etikety_lang')]) ? store.get('etikety_lang') : 'vi';
  let L = STR[lang];
  let labels = loadLabels();
  let presets = loadPresets();
  let nextPos = parseInt(store.get('etikety_nextpos')) || 1;

  function loadLabels() { try { const s = JSON.parse(store.get('etikety_labels')); return Array.isArray(s) ? s : []; } catch (e) { return []; } }
  function saveLabels() { store.set('etikety_labels', JSON.stringify(labels)); }
  function loadPresets() {
    try {
      const s = JSON.parse(store.get('etikety_presets'));
      if (Array.isArray(s)) return s.map(p => [p[0], p[1] || '', (p[2] !== undefined) ? p[2] : suggestBarcodeFromName(p[0], [])]);
    } catch (e) {}
    return DEFAULT_PRESETS.map(p => [p[0], p[1], p[2]]);
  }
  function savePresets() { store.set('etikety_presets', JSON.stringify(presets)); }

  // ===== INIT / LANGUAGE =====
  function init() {
    buildLayoutOptions();
    if (!store.get('etikety_reset_v2')) { store.set('etikety_layout', DEFAULT_LAYOUT); store.set('etikety_reset_v2', '1'); }
    document.getElementById('flayout').value = LAYOUTS[store.get('etikety_layout')] ? store.get('etikety_layout') : DEFAULT_LAYOUT;
    applyLang();
    clampPos();
    renderPresets();
    renderTracker();
    renderPreview();
  }

  function buildLayoutOptions() {
    const sel = document.getElementById('flayout');
    const cur = sel.value;
    sel.innerHTML = Object.keys(LAYOUTS).map(k => {
      const rec = k === '21' ? ' ' + L.recommended : '';
      return `<option value="${k}">${LAYOUTS[k].label}${rec}</option>`;
    }).join('');
    if (cur) sel.value = cur;
  }

  function setLang(l) {
    if (!STR[l]) return;
    lang = l; L = STR[l];
    store.set('etikety_lang', l);
    applyLang();
  }

  function applyLang() {
    document.documentElement.lang = L.htmlLang;
    document.title = L.docTitle;
    document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = L[el.getAttribute('data-i18n')]; });
    document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = L[el.getAttribute('data-i18n-ph')]; });
    document.getElementById('btnPrev').title = L.prevTitle;
    document.getElementById('btnReset').title = L.resetTitle;
    document.getElementById('btnNext').title = L.nextTitle;
    document.getElementById('langVi').classList.toggle('active', lang === 'vi');
    document.getElementById('langCs').classList.toggle('active', lang === 'cs');
    buildLayoutOptions();
    renderPresets();
    renderTracker();
    renderPreview();
    checkNote();
  }

  function curLayout() { return document.getElementById('flayout').value; }
  function perPage() { const c = LAYOUTS[curLayout()]; return c.cols * c.rows; }

  function fillPreset(name, origin) {
    document.getElementById('fname').value = name;
    document.getElementById('forigin').value = origin;
    document.getElementById('fpricekg').focus();
    checkNote();
  }

  // ===== BARCODE SUGGESTION =====
  function normalizeName(s) {
    return (s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toUpperCase().replace(/[^A-Z0-9 ]/g, '');
  }
  function suggestBarcodeFromName(name, excludePresets) {
    const norm = normalizeName(name).trim();
    if (!norm) return '';
    const words = norm.split(/\s+/).filter(Boolean);
    const VOWELS = 'AEIOUY';
    let prefix;
    if (words.length >= 2) {
      prefix = (words[0][0] || 'X') + (words[1][0] || 'X');
    } else {
      const w = words[0];
      let c1 = w[0] || 'X', c2 = '';
      for (let i = 1; i < w.length; i++) {
        if (!VOWELS.includes(w[i])) { c2 = w[i]; break; }
      }
      if (!c2) c2 = w[1] || 'X';
      prefix = c1 + c2;
    }
    const others = excludePresets || presets;
    for (let n = 1; n < 100; n++) {
      const candidate = prefix + String(n).padStart(2, '0');
      if (!others.some(p => (p[2] || '').toUpperCase() === candidate)) return candidate;
    }
    return prefix + String(Math.floor(Math.random() * 90) + 10);
  }
  let barcodeSuggested = true; // flag: input still showing suggestion
  function onPresetNameInput() {
    if (!barcodeSuggested) return;
    if (!document.getElementById('newPresetUseBC').checked) return;
    const name = document.getElementById('newPresetName').value;
    const bc = document.getElementById('newPresetBarcode');
    bc.value = suggestBarcodeFromName(name, presets);
    bc.classList.add('suggested');
    updatePresetHint();
  }
  function onPresetBarcodeInput() {
    barcodeSuggested = false;
    document.getElementById('newPresetBarcode').classList.remove('suggested');
    updatePresetHint();
  }
  function onToggleBarcode() {
    const on = document.getElementById('newPresetUseBC').checked;
    const bc = document.getElementById('newPresetBarcode');
    bc.disabled = !on;
    document.getElementById('pfToggle').classList.toggle('off', !on);
    document.getElementById('pfToggleLabel').textContent = on ? L.useBarcode : L.noBarcode;
    if (on && !bc.value) {
      bc.value = suggestBarcodeFromName(document.getElementById('newPresetName').value, presets);
      bc.classList.add('suggested');
      barcodeSuggested = true;
    }
    updatePresetHint();
  }
  function updatePresetHint() {
    const hint = document.getElementById('pfHint');
    const on = document.getElementById('newPresetUseBC').checked;
    if (!on) { hint.className = 'pf-hint'; hint.textContent = ''; return; }
    const code = document.getElementById('newPresetBarcode').value.trim().toUpperCase();
    if (code.length > 0 && code.length < 4) { hint.className = 'pf-hint show'; hint.textContent = '⚠️ ' + L.bcHintShort; return; }
    const dup = presets.find(p => (p[2] || '').toUpperCase() === code && code);
    if (dup) { hint.className = 'pf-hint show'; hint.textContent = '⚠️ ' + L.bcHintDuplicate + ' "' + dup[0] + '"'; return; }
    hint.className = 'pf-hint';
    hint.textContent = '';
  }

  // ===== PRESETS =====
  function renderPresets() {
    const html = presets.map((p, i) => {
      const bc = p[2] || '';
      const bcHtml = bc
        ? `<span class="preset-bc">${esc(bc)}</span>`
        : `<span class="preset-bc off">--</span>`;
      return `<span class="preset-chip">
        <button class="preset-fill" onclick="fillPreset('${esc(p[0])}','${esc(p[1])}')">${esc(p[0])}</button>
        ${bcHtml}
        <button class="preset-del" onclick="removePreset(${i})" title="${L.del}">×</button>
      </span>`;
    }).join('');
    document.getElementById('presets').innerHTML = html;
  }
  function removePreset(i) { presets.splice(i, 1); savePresets(); renderPresets(); }
  function toggleAddPreset(show) {
    const f = document.getElementById('presetAddForm');
    f.classList.toggle('show', show);
    document.getElementById('presetAddRow').style.display = show ? 'none' : 'flex';
    if (show) {
      document.getElementById('newPresetName').value = '';
      document.getElementById('newPresetOrigin').value = '';
      document.getElementById('newPresetBarcode').value = '';
      document.getElementById('newPresetBarcode').classList.remove('suggested');
      document.getElementById('newPresetUseBC').checked = true;
      document.getElementById('newPresetBarcode').disabled = false;
      document.getElementById('pfToggle').classList.remove('off');
      document.getElementById('pfToggleLabel').textContent = L.useBarcode;
      barcodeSuggested = true;
      updatePresetHint();
      document.getElementById('newPresetName').focus();
    }
  }
  function confirmAddPreset() {
    const name = document.getElementById('newPresetName').value.trim();
    const origin = document.getElementById('newPresetOrigin').value.trim();
    const useBC = document.getElementById('newPresetUseBC').checked;
    let bc = document.getElementById('newPresetBarcode').value.trim().toUpperCase();
    if (!name) { alert(L.needName); return; }
    if (presets.some(p => p[0].toLowerCase() === name.toLowerCase())) { alert(L.presetExists); return; }
    if (useBC) {
      if (!bc) bc = suggestBarcodeFromName(name, presets);
      if (bc.length < 4) { alert(L.bcHintShort); return; }
      if (presets.some(p => (p[2] || '').toUpperCase() === bc)) { alert(L.bcHintDuplicate + ' "' + presets.find(p => (p[2] || '').toUpperCase() === bc)[0] + '"'); return; }
    } else {
      bc = '';
    }
    presets.push([name, origin, bc]); savePresets(); renderPresets(); toggleAddPreset(false);
  }
  function getBarcodeForName(name) {
    const p = presets.find(x => x[0].toLowerCase() === (name || '').toLowerCase());
    return p ? (p[2] || '') : '';
  }

  function formatCzech(num) { return num.toFixed(2).replace('.', ','); }

  function autoCalc() {
    const priceKg = parseFloat(document.getElementById('fpricekg').value);
    const weight = parseFloat(document.getElementById('fweight').value);
    const elKus = document.getElementById('autoPriceKus');
    const el100g = document.getElementById('autoPrice100g');
    if (!isNaN(priceKg) && !isNaN(weight) && weight > 0 && priceKg > 0) {
      elKus.textContent = formatCzech(priceKg * weight) + ' Kč';
      el100g.textContent = formatCzech(priceKg / 10) + ' Kč';
    } else {
      elKus.textContent = '—';
      el100g.textContent = (!isNaN(priceKg) && priceKg > 0) ? formatCzech(priceKg / 10) + ' Kč' : '—';
    }
  }

  function addLabel() {
    const name = document.getElementById('fname').value.trim();
    const origin = document.getElementById('forigin').value.trim();
    const weight = parseFloat(document.getElementById('fweight').value);
    const priceKg = parseFloat(document.getElementById('fpricekg').value);
    const note = document.getElementById('fnote').value.trim();
    const count = parseInt(document.getElementById('fcount').value) || 1;

    if (!name) { alert(L.needName); return; }
    if (isNaN(weight) || weight <= 0) { alert(L.needWeight); return; }
    if (isNaN(priceKg) || priceKg <= 0) { alert(L.needPrice); return; }

    const cfg = LAYOUTS[curLayout()];
    if (note.length > cfg.noteMax) {
      alert(`${L.noteExceedPrefix} ${note.length}/${cfg.noteMax} ${L.noteExceedSuffix}`);
      document.getElementById('fnote').focus();
      return;
    }
    if (name.length > cfg.nameMax) {
      if (!confirm(L.longConfirm)) return;
    }

    const priceKus = priceKg * weight;
    const per100g = priceKg / 10;
    const barcode = getBarcodeForName(name);
    for (let i = 0; i < count; i++) labels.push({ name, origin, weight, priceKg, price: priceKus, per100g, note, barcode });
    saveLabels();

    document.getElementById('fname').value = '';
    document.getElementById('forigin').value = '';
    document.getElementById('fweight').value = '';
    document.getElementById('fpricekg').value = '';
    document.getElementById('fnote').value = '';
    document.getElementById('fcount').value = '1';
    document.getElementById('autoPriceKus').textContent = '—';
    document.getElementById('autoPrice100g').textContent = '—';
    checkNote();
    renderPreview();
    renderTracker();
  }

  function clearAll() {

    if (confirm(L.confirmClear)) { labels = []; saveLabels(); renderPreview(); renderTracker(); }
  }

              </div>
            </div>
          </div>
          ${del}
        </div>`;
      } else if (g.note) {
        html += `
        <div class="label-preview">${count}
          <div class="lp-twocol">
            <div class="lp-left">
              <div class="lp-name">${esc(g.name)}</div>
              <div class="lp-origin">Země původu: ${esc(g.origin)}</div>

              <div class="lp-note-b">${esc(g.note)}</div>
            </div>

      } else if (g.barcode) {

          <div class="lp-twocol">
            <div class="lp-left">
              <div class="lp-name">${esc(g.name)}</div>
              <div class="lp-origin">Země původu: ${esc(g.origin)}</div>
              <div class="lp-grid"><span>Hmotnost</span><span>${formatCzech(g.weight)} kg</span><span>Cena za kg</span><span>${formatCzech(g.priceKg)} Kč</span></div>

        <div class="label-preview">${count}
          <div class="lp-name">${esc(g.name)}</div>
          <div class="lp-origin">Země původu: ${esc(g.origin)}</div>
          <div class="lp-line">Hmotnost: ${formatCzech(g.weight)} kg</div>
          <div class="lp-line">Cena za kg: ${formatCzech(g.priceKg)} Kč</div>
          <div class="lp-price-big">${formatCzech(g.price)} Kč/ks</div>
          <div class="lp-price100">${formatCzech(g.per100g)} Kč/100g</div>
          ${del}
        </div>`;
      }
    }
    list.innerHTML = html;
    renderBarcodes(list, { width: 1.4, height: 28, fontSize: 9 });
  }
  function renderBarcodes(container, opts) {
    if (typeof JsBarcode === 'undefined') return;
    container.querySelectorAll('svg[data-bc]').forEach(el => {
      const code = el.getAttribute('data-bc');
      if (!code) return;
      try {
        JsBarcode(el, code, Object.assign({ format: 'CODE128', displayValue: true, margin: 0, background: '#ffffff', width: 1.4, height: 28, fontSize: 9 }, opts || {}));
      } catch (e) {}
    });
  }
  function removeGroup(key) {
    labels = labels.filter(l => `${l.name}|${l.origin}|${l.weight}|${l.priceKg}|${l.note || ''}|${l.barcode || ''}` !== key);
    saveLabels(); renderPreview(); renderTracker();
  }
  function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

  // ===== POSITION TRACKER =====
  function clampPos() { const pp = perPage(); if (nextPos < 1) nextPos = 1; if (nextPos > pp) nextPos = pp; savePos(); }
  function savePos() { store.set('etikety_nextpos', nextPos); store.set('etikety_layout', curLayout()); }
  function onLayoutChange() { clampPos(); renderTracker(); checkNote(); }
  function setStartPos(n) { nextPos = n; clampPos(); renderTracker(); }
  function adjustPos(d) { const pp = perPage(); nextPos += d; if (nextPos < 1) nextPos = pp; if (nextPos > pp) nextPos = 1; savePos(); renderTracker(); }
  function resetPos() { nextPos = 1; savePos(); renderTracker(); }

  function renderTracker() {
    const cfg = LAYOUTS[curLayout()];
    const pp = cfg.cols * cfg.rows;
    const queued = labels.length;
    const queueEnd = nextPos + queued - 1;
    document.getElementById('trackerLayout').textContent = cfg.label;
    document.getElementById('nextPosLabel').textContent = '#' + nextPos;
    const grid = document.getElementById('trackerGrid');
    grid.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
    let html = '';
    for (let i = 1; i <= pp; i++) {
      let cls = 'free';
      if (i < nextPos) cls = 'used';
      else if (queued > 0 && i >= nextPos && i <= queueEnd) cls = 'queued';
      else if (queued === 0 && i === nextPos) cls = 'next';
      html += `<div class="tcell ${cls}" onclick="setStartPos(${i})">${i}</div>`;
    }
    grid.innerHTML = html;
    const free = pp - (nextPos - 1);
    let info = `${L.free}: ${free} / ${pp}`;
    if (queued > 0) info += ` • ${L.willPrint} ${queued} ${L.unit}`;
    document.getElementById('trackerFree').textContent = info;
  }

  // ===== PRINT (text na etiketě vždy česky) =====
  function fitFont(text, maxChars, baseFont, minFont) {
    if (!text || text.length <= maxChars) return baseFont;
    return Math.max(minFont, +(baseFont * maxChars / text.length).toFixed(1));
  }
  function bcSvg(code, cfg) {
    return `<svg data-bc="${esc(code)}" style="width:${cfg.bcW}mm;height:${cfg.bcH}mm;display:block;"></svg>`;
  }
  function renderPrintCell(l, cfg) {
    const base = `width:${cfg.w}mm;height:${cfg.h}mm;`;
    if (!l) return `<div class="print-label" style="${base}"></div>`;
    const nameFont = fitFont(l.name, cfg.nameMax, cfg.nameF, Math.max(7, cfg.nameF * 0.6));
    const hasNote = !!l.note;
    const hasBC = !!l.barcode;

    const infoLeft = `
      <div style="font-weight:700;font-size:${nameFont}pt;line-height:1.1;word-break:break-word;">${esc(l.name)}</div>
      <div style="color:#333;font-size:${cfg.originF}pt;margin-bottom:0.6mm;">Země původu: ${esc(l.origin)}</div>
      <div style="display:grid;grid-template-columns:max-content max-content;column-gap:2mm;row-gap:0.2mm;font-size:${cfg.detF}pt;line-height:1.25;">
        <span>Hmotnost</span><span>${formatCzech(l.weight)} kg</span>
        <span>Cena za kg</span><span>${formatCzech(l.priceKg)} Kč</span>
      </div>
      <div style="font-weight:800;font-size:${cfg.bigF}pt;margin-top:0.6mm;line-height:1;">${formatCzech(l.price)} Kč/ks</div>
      <div style="font-size:${cfg.p100F}pt;color:#333;">${formatCzech(l.per100g)} Kč / 100g</div>`;

    if (hasNote && hasBC) {
      const noteFont = fitFont(l.note, cfg.noteMax, cfg.noteF, 5);
      const headF = Math.max(6, cfg.originF - 1);
      return `<div class="print-label" style="${base}flex-direction:row;align-items:stretch;padding:2mm 3mm;gap:3mm;">
        <div style="flex:1.3;display:flex;flex-direction:column;justify-content:flex-start;text-align:left;overflow:hidden;">${infoLeft}</div>
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
          <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-start;text-align:left;">
            <div style="font-size:${noteFont}pt;font-style:italic;line-height:1.2;word-break:break-word;">${esc(l.note)}</div>
          </div>
          <div style="padding-top:0.5mm;display:flex;flex-direction:column;align-items:center;">
            ${bcSvg(l.barcode, cfg)}
          </div>
        </div>
      </div>`;
    }
    if (hasNote) {
      const noteFont = fitFont(l.note, cfg.noteMax, cfg.noteF, 5);
      const headF = Math.max(6, cfg.originF - 1);
      return `<div class="print-label" style="${base}flex-direction:row;align-items:stretch;padding:2mm 3mm;gap:3mm;">
        <div style="flex:1.3;display:flex;flex-direction:column;justify-content:flex-start;text-align:left;overflow:hidden;">${infoLeft}</div>
        <div style="flex:1;display:flex;flex-direction:column;justify-content:center;text-align:left;overflow:hidden;">
          <div style="font-size:${noteFont}pt;font-style:italic;line-height:1.2;word-break:break-word;">${esc(l.note)}</div>
        </div>
      </div>`;
    }
    if (hasBC) {
      return `<div class="print-label" style="${base}flex-direction:row;align-items:stretch;padding:2mm 3mm;gap:3mm;">
        <div style="flex:1.3;display:flex;flex-direction:column;justify-content:flex-start;text-align:left;overflow:hidden;">${infoLeft}</div>
        <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;overflow:hidden;">
          ${bcSvg(l.barcode, cfg)}
        </div>
      </div>`;
    }

    return `<div class="print-label" style="${base}padding:2mm 4mm;text-align:center;">
      <div style="font-weight:700;font-size:${nameFont}pt;line-height:1.1;word-break:break-word;">${esc(l.name)}</div>
      <div style="color:#333;font-size:${cfg.originF}pt;margin-bottom:0.6mm;">Země původu: ${esc(l.origin)}</div>
      <div style="font-size:${cfg.detF}pt;line-height:1.25;">Hmotnost: ${formatCzech(l.weight)} kg</div>
      <div style="font-size:${cfg.detF}pt;line-height:1.25;">Cena za kg: ${formatCzech(l.priceKg)} Kč</div>
      <div style="font-weight:800;font-size:${cfg.bigF}pt;margin-top:0.8mm;line-height:1;">${formatCzech(l.price)} Kč/ks</div>
      <div style="font-size:${cfg.p100F}pt;color:#333;">${formatCzech(l.per100g)} Kč / 100g</div>
    </div>`;
  }

  function printLabels() {
    if (labels.length === 0) {
      const name = document.getElementById('fname').value.trim();
      const weight = parseFloat(document.getElementById('fweight').value);
      const priceKg = parseFloat(document.getElementById('fpricekg').value);
      if (name && weight > 0 && priceKg > 0) addLabel();
    }
    if (labels.length === 0) { alert(L.nothingPrint); return; }

    const cfg = LAYOUTS[curLayout()];
    const pp = cfg.cols * cfg.rows;
    const offset = nextPos - 1;
    const padTop = Math.max(0, (297 - cfg.rows * cfg.h) / 2);
    const cells = [];
    for (let i = 0; i < offset; i++) cells.push(null);
    labels.forEach(l => cells.push(l));
    while (cells.length % pp !== 0) cells.push(null);
    let html = '';
    for (let p = 0; p < cells.length / pp; p++) {
      const pageCells = cells.slice(p * pp, (p + 1) * pp);
      html += `<div class="print-page"><div class="print-grid" style="padding-top:${padTop}mm;">`;
      pageCells.forEach(c => { html += renderPrintCell(c, cfg); });
      html += `</div></div>`;
    }
    const pp_el = document.getElementById('printPage');
    pp_el.innerHTML = html;
    // Render barcodes in print SVGs — size based on layout
    if (typeof JsBarcode !== 'undefined') {
      pp_el.querySelectorAll('svg[data-bc]').forEach(el => {
        const code = el.getAttribute('data-bc');
        if (!code) return;
        try {
          JsBarcode(el, code, { format: 'CODE128', displayValue: true, fontSize: cfg.bcFont * 2, width: 2, height: 40, margin: 0, background: '#ffffff' });
          // Override the JsBarcode width/height attrs so our mm CSS sizing wins via viewBox
          el.removeAttribute('width');
          el.removeAttribute('height');
          el.setAttribute('preserveAspectRatio', 'none');
        } catch (e) {}
      });
    }
    nextPos = ((nextPos - 1 + labels.length) % pp) + 1;
    labels = [];
    saveLabels(); savePos(); renderPreview(); renderTracker();
    setTimeout(() => { window.print(); }, 200);
  }

  // ===== Live warning when text is too long =====
  function checkNote() {
    const cfg = LAYOUTS[curLayout()];
    const note = document.getElementById('fnote').value;
    const name = document.getElementById('fname').value;
    const warn = document.getElementById('noteWarn');
    const noteEl = document.getElementById('fnote');
    const noteOver = note.length > cfg.noteMax;
    noteEl.classList.toggle('error', noteOver);
    if (noteOver) {
      warn.classList.add('show', 'error');
      warn.textContent = `${L.noteExceedPrefix} ${note.length}/${cfg.noteMax} ${L.noteExceedSuffix}`;
      return;
    }
    warn.classList.remove('error');
    const msgs = [];
    if (name.length > cfg.nameMax) msgs.push(`${L.nameShort} (${name.length}/${cfg.nameMax} ${L.chars})`);
    if (msgs.length) { warn.textContent = `${L.warnPrefix} ${msgs.join(', ')} ${L.warnSuffix}`; warn.classList.add('show'); }
    else warn.classList.remove('show');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.closest('.fields .form-group')) addLabel();
  });

  init();
</script>
</body>
</html>
